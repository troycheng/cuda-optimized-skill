interface:
  display_name: "CUDA Kernel Optimizer"
  short_description: "Evidence-driven GPU kernel and workload optimization"
  default_prompt: "Use $cuda-kernel-optimizer to optimize or diagnose this CUDA, CUTLASS, Triton, framework, or serving workload. Establish the readiness and claim ceiling, freeze the real objective and allowed scope, calibrate measurement stability, and load only architecture-compatible, evidence-matched capability cards. For long runs, keep planning separate from deterministic Controller state and ledger replay. Require user-provided workload evidence for end-to-end claims and keep host changes recommend-only. Primary-source search and external research are optional; local correctness and measurement remain authoritative."
